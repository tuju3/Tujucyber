<!-- AUTO POPUP -->
<div id="popup" style="
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  border:1px solid #ccc;
  padding:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  width:250px;
">
  <p><b>Need help?</b></p>
  <p>Chat with us on WhatsApp</p>

  <a id="whatsappBtn" target="_blank">
    <button style="background:green;color:white;padding:10px;border:none;">
      Chat Now
    </button>
  </a>

  <br><br>
  <button onclick="closePopup()">Close</button>
</div>

<script>
// Show popup after 5 seconds
setTimeout(() => {
  document.getElementById("popup").style.display = "block";
}, 5000);

// Close popup
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// WhatsApp auto message
const phone = "254793512145"; // your number

const message = "Hello Tuju Cyber, I need your services.";

const link = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

document.getElementById("whatsappBtn").href = link;
</script>
